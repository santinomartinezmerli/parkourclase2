<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Parkour Runner</title>
    <link rel="stylesheet" href="parkour.css">
</head>
<body>
    <div class="game-container">
        <div class="hud">
            <div class="lives-container">
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
            </div>
            <div class="score-container">
                <span id="score">0</span>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="start-screen" class="overlay">
            <h1>🏃 PARKOUR RUNNER</h1>
            <p>Salta entre plataformas y recoge vidas extras</p>
            <button id="start-btn">INICIAR</button>
            <div class="controls-hint">
                <p>← → o TAP para moverte</p>
            </div>
        </div>
        
        <div id="game-over" class="overlay hidden">
            <h1>GAME OVER</h1>
            <p>Puntuación: <span id="final-score">0</span></p>
            <button id="restart-btn">REINTENTAR</button>
        </div>
    </div>
    
    <script src="parkour.js"></script>
</body>
</html>
