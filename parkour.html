<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Breakout</title>
    <link rel="stylesheet" href="parkour.css">
</head>
<body>
    <div class="game-container">
        <div class="hud">
            <div class="score-box">
                <span>PUNTOS</span>
                <span id="score">0</span>
            </div>
            <div class="lives-box">
                <span>VIDAS</span>
                <span id="lives">3</span>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="start-screen" class="overlay">
            <h1>🏓 BREAKOUT</h1>
            <p>Rompé todos los ladrillos</p>
            <button id="start-btn">JUGAR</button>
            <div class="controls-hint">
                <p>← → o toca para mover</p>
            </div>
        </div>
        
        <div id="game-over" class="overlay hidden">
            <h1>GAME OVER</h1>
            <p>Puntuación: <span id="final-score">0</span></p>
            <button id="restart-btn">REINTENTAR</button>
        </div>
    </div>
    
    <script src="parkour.js"></script>
</body>
</html>
